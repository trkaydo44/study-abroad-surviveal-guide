<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Survival Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Survival Guide</a>
    <div class="ms-auto">
      <a class="btn btn-outline-dark btn-sm" href="register.html">Create account</a>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container" style="max-width:520px;">
    <h1 class="fw-bold mb-2">Login</h1>
    <p class="text-muted mb-4">Login to post tips and ask questions.</p>

    <div class="p-4 border rounded-4">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" id="email" type="email" placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" id="password" type="password" placeholder="Password">
      </div>

      <div class="text-danger small mb-2" id="err"></div>

      <button class="btn btn-primary w-100" id="btnLogin">Login</button>

      <div class="small-muted mt-3">
        No account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script>
  document.getElementById("btnLogin").addEventListener("click", () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const out = loginUser(email, password);
    if (!out.ok) {
      document.getElementById("err").textContent = out.message;
      return;
    }
    location.href = "tips.html";
  });
</script>
</body>
</html>
