<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tips | Survival Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Survival Guide</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link active" href="tips.html">Tips</a></li>
        <li class="nav-item"><a class="nav-link" href="forum.html">Q&A</a></li>
        <li class="nav-item"><a class="nav-link" href="guides.html">Country Guides</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item" data-auth-area></li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="fw-bold mb-1">Student Tips</h1>
        <p class="text-muted mb-0">Browse tips by country, category, or search.</p>
      </div>
      <button class="btn btn-outline-dark" id="btnAddTip">+ Add a tip</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <label class="form-label">Country</label>
        <select class="form-select" id="countryFilter">
          <option value="All">All</option>
          <option value="UK">UK</option>
          <option value="USA">USA</option>
          <option value="Canada">Canada</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Category</label>
        <select class="form-select" id="categoryFilter">
          <option value="All">All</option>
          <option value="Budget">Budget</option>
          <option value="Housing">Housing</option>
          <option value="Transport">Transport</option>
          <option value="Food">Food</option>
          <option value="Culture">Culture</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Search</label>
        <input class="form-control" id="searchBox" placeholder="e.g., Oyster card, halal food, bank account" />
      </div>
    </div>

    <div class="row g-3" id="tipsList"></div>
  </div>
</main>

<!-- Add Tip Modal -->
<div class="modal fade" id="tipModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Add a tip</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Country</label>
            <select class="form-select" id="tipCountry">
              <option>UK</option><option>USA</option><option>Canada</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Category</label>
            <select class="form-select" id="tipCategory">
              <option>Budget</option><option>Housing</option><option>Transport</option><option>Food</option><option>Culture</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Title</label>
            <input class="form-control" id="tipTitle" placeholder="Short title">
          </div>
          <div class="col-12">
            <label class="form-label">Tip</label>
            <textarea class="form-control" id="tipText" rows="4" placeholder="Write your advice in a simple way..."></textarea>
          </div>
          <div class="col-12">
            <div class="alert alert-warning mb-0 small">
              Note: Right now tips are saved in your browser (localStorage). Later we can connect Supabase.
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="me-auto text-danger small" id="tipError"></div>
        <button class="btn btn-outline-dark" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="saveTipBtn">Save Tip</button>
      </div>
    </div>
  </div>
</div>

<footer class="border-top py-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
    <div class="text-muted">© 2026 Study Abroad Survival Guide</div>
    <div class="text-muted">Tips are crowd-sourced by students.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="tips.js"></script>
</body>
</html>
